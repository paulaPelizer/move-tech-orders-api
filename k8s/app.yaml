apiVersion: apps/v1
kind: Deployment
metadata:
  name: minha-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minha-api
  template:
    metadata:
      labels:
        app: minha-api
    spec:
      imagePullSecrets:
        - name: mgc-registry-secret
      containers:
        - name: minha-api
          image: container-registry.br-se1.magalu.cloud/lab-registry-paula/minha-api:v1
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: minha-api
spec:
  type: LoadBalancer
  selector:
    app: minha-api
  ports:
    - port: 8000
      targetPort: 8000
